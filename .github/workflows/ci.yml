name: FruitKart CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # -------------------------------------------------------
  # Job 1: Build entire backend via solution file
  # Handles JWTAuth shared library references automatically
  # -------------------------------------------------------
  build-backend:
    name: Build Backend (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Restore all projects in the backend folder at once
      - name: Restore dependencies
        run: dotnet restore FruitKart_Backend/

      # Build everything — cross-project refs (JWTAuth) resolve correctly
      - name: Build
        run: dotnet build FruitKart_Backend/ --no-restore --configuration Release

  # -------------------------------------------------------
  # Job 2: Build the React frontend
  # -------------------------------------------------------
  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mangopedia-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mangopedia-react

      - name: Build
        run: npm run build
        working-directory: mangopedia-react
